<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evaluación del Equipo</title>
  <style>
    body { font-family: Arial; margin: 30px; }
    .aprobado { color: green; font-weight: bold; }
    .rechazado { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📋 Evaluación del Equipo</h1>
  <p id="estado">Cargando evaluación...</p>

  <div id="resultado" style="display:none;">
    <h2>🧠 Evaluación del Equipo</h2>
    <ul>
      <li><strong>Sistema Operativo:</strong> <span id="so"></span></li>
      <li><strong>Arquitectura:</strong> <span id="arquitectura"></span></li>
      <li><strong>RAM:</strong> <span id="ram"></span> GB</li>
      <li><strong>Disco:</strong> <span id="disco"></span> GB</li>
    </ul>
    <p><strong>Estado del equipo:</strong> <span id="estado_equipo"></span></p>

    <h2>🌐 Evaluación de Internet</h2>
    <ul>
      <li><strong>Velocidad de descarga:</strong> <span id="descarga"></span> Mbps</li>
      <li><strong>Latencia:</strong> <span id="latencia"></span> ms</li>
    </ul>
    <p><strong>Estado de internet:</strong> <span id="estado_internet"></span></p>
  </div>

  <script>
    async function medirVelocidad() {
      const inicio = performance.now();
      try {
        await fetch("https://via.placeholder.com/1000x100.png?rand=" + Math.random(), {cache: "no-store"});
        const fin = performance.now();
        const duracion = (fin - inicio) / 1000; // segundos
        const tamanioBytes = 100000; // aprox. 100KB
        const velocidadMbps = ((tamanioBytes * 8) / duracion) / (1024 * 1024); // en Mbps
        return velocidadMbps.toFixed(2);
      } catch (e) {
        return 0;
      }
    }

    async function medirLatencia() {
      const inicio = performance.now();
      try {
        await fetch("https://www.google.com/favicon.ico", {mode: 'no-cors'});
        const fin = performance.now();
        return Math.round(fin - inicio);
      } catch {
        return 999;
      }
    }

    async function evaluar() {
      const ram = navigator.deviceMemory || 0;
      const arquitectura = navigator.userAgent.includes("64") ? "64bit" : "32bit";
      const so = navigator.userAgent;
      const disco = 386; // estimado, ya que no se puede obtener exacto
      const nucleos = navigator.hardwareConcurrency || 1;

      const velocidad_descarga = await medirVelocidad();
      const latencia = await medirLatencia();

      const equipo = {
        sistema_operativo: so,
        arquitectura: arquitectura,
        ram: ram,
        disco: disco,
        nucleos_fisicos: nucleos
      };

      const internet = {
        velocidad_descarga: parseFloat(velocidad_descarga),
        latencia: latencia
      };

      const datos = { equipo, internet };

      const res = await fetch('/resultado', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      const resultado = await res.json();
      document.getElementById("estado").style.display = "none";
      document.getElementById("resultado").style.display = "block";

      document.getElementById("so").textContent = equipo.sistema_operativo;
      document.getElementById("arquitectura").textContent = equipo.arquitectura;
      document.getElementById("ram").textContent = equipo.ram;
      document.getElementById("disco").textContent = equipo.disco;
      document.getElementById("descarga").textContent = internet.velocidad_descarga;
      document.getElementById("latencia").textContent = internet.latencia;

      const estadoEquipo = resultado.estado_equipo;
      const estadoInternet = resultado.estado_internet;

      document.getElementById("estado_equipo").textContent = estadoEquipo;
      document.getElementById("estado_equipo").className = estadoEquipo === "APROBADO" ? "aprobado" : "rechazado";

      document.getElementById("estado_internet").textContent = estadoInternet;
      document.getElementById("estado_internet").className = estadoInternet === "APROBADO" ? "aprobado" : "rechazado";
    }

    evaluar();
  </script>
</body>
</html>
