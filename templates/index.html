<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador Web</title>
  <script defer src="{{ url_for('static', filename='script.js') }}"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f4f4; }
    h1 { color: #333; }
    .card { background: white; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h1>Validación del equipo e internet</h1>

  <div class="card">
    <h3>Características del equipo</h3>
    <p><strong>SO:</strong> <span id="so"></span></p>
    <p><strong>Arquitectura:</strong> <span id="arquitectura"></span></p>
    <p><strong>Navegador:</strong> <span id="navegador"></span></p>
    <p><strong>Memoria RAM:</strong> <span id="ram"></span></p>
  </div>

  <div class="card">
    <h3>Velocidad de Internet</h3>
    <p><strong>Descarga:</strong> <span id="download"></span></p>
    <p><strong>Carga:</strong> <span id="upload"></span></p>
    <p><strong>Latencia:</strong> <span id="latency"></span></p>
  </div>
</body>
</html>
