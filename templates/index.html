<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validador Web</title>
 <script>
document.addEventListener("DOMContentLoaded", async () => {
    const hardware = {
        sistema: navigator.userAgent,
        arquitectura: navigator.platform.includes('64') ? '64bit' : '32bit',
        ram: navigator.deviceMemory || 'Desconocido',
        procesador: 'Intel o AMD multinúcleo', // no accesible por navegador
        nucleos_fisicos: navigator.hardwareConcurrency / 2 || 2,
        nucleos_logicos: navigator.hardwareConcurrency || 4
    };

    const velocidad = await medirInternet();

    const datos = {
        ...hardware,
        ...velocidad
    };

    await fetch("/resultado", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
    }).then(res => {
        if (res.redirected) {
            window.location.href = res.url;
        }
    });
});

async function medirInternet() {
    const start = performance.now();
    try {
        const response = await fetch("https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_150x54dp.png", { mode: "no-cors" });
        const end = performance.now();
        const tiempo = end - start;
        return {
            descarga: 100,  // puedes personalizar esto mejor
            carga: 10,
            latencia: parseFloat(tiempo.toFixed(2))
        };
    } catch (e) {
        return {
            descarga: 0,
            carga: 0,
            latencia: 999
        };
    }
}
</script>

</head>
<body>
  <h2>🕵️‍♂️ Evaluando automáticamente tu equipo...</h2>
</body>
</html>
